<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Mulch Hydroseeding</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* Hero */
        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 60vh;
            text-align: center;
            padding: 3rem 1rem 2rem;
        }

        .hero h1 {
            color: #2e7d32;
            font-size: 4rem;
            font-weight: 700;
        }

        .hero p {
            color: #555555;
            font-size: 1.5rem;
            font-weight: 400;
            margin-top: 0.4rem;
        }

        /* Contact form */
        .contact {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
        }

        .contact h2 {
            color: #2e7d32;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        form {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        form input,
        form textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
        }

        form input:focus,
        form textarea:focus {
            border-color: #2e7d32;
        }

        form textarea {
            resize: vertical;
            min-height: 130px;
        }

        form button {
            padding: 0.8rem;
            background: #2e7d32;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        form button:hover {
            background: #1b5e20;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: #2e7d32;
            border-radius: 2px;
            margin: 0 auto 2rem;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>green mulch</h1>
        <p>hydroseeding</p>
    </div>

    <div class="contact">
        <div class="divider"></div>
        <h2>get in touch</h2>
        <form action="https://formspree.io/f/xlgwykgz" method="POST">
            <input type="text" name="name" placeholder="your name" required>
            <input type="email" name="email" placeholder="your email" required>
            <input type="tel" name="phone" placeholder="your phone number">
            <textarea name="message" placeholder="your message" required></textarea>
            <button type="submit">send message</button>
        </form>
    </div>

</body>
</html>
